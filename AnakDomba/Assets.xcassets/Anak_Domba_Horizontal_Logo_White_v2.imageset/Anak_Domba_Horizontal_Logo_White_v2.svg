<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <filter id="glow_horiz">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(100, 30) scale(0.65)" filter="url(#glow_horiz)">
    <!-- Sun Rays -->
    <circle cx="250" cy="250" r="180" stroke="#FFFFFF" stroke-width="8" stroke-dasharray="20 25" fill="none" opacity="0.8"/>
    
    <!-- Heart -->
    <path d="M 250 180 C 250 180 230 150 200 150 C 160 150 160 200 160 200 C 160 250 250 300 250 300 C 250 300 340 250 340 200 C 340 200 340 150 300 150 C 270 150 250 180 250 180 Z" fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Cross -->
    <path d="M 250 70 V 150 M 250 300 V 360 M 110 180 H 160 M 340 180 H 390" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" fill="none"/>
    
    <!-- Book -->
    <path d="M 100 390 Q 175 390 250 430 Q 325 390 400 390 L 400 460 Q 325 460 250 500 Q 175 460 100 460 Z" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M 250 430 V 500" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Text placed next to the icon -->
  <text x="480" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="110" font-weight="700" fill="#FFFFFF" text-anchor="start" letter-spacing="1">Anak Domba</text>
</svg>